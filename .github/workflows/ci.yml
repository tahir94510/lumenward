# Lumenward — build & verify on every push and PR.
# Publishing (itch.io, Android AAB) lives in release.yml so PR runs stay a
# single always-green job with no skipped entries.
name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build all variants
        run: npm run build
      - name: Syntax check
        run: node --check src/game.js && node --check dist/web/app.min.js
      - name: Variant isolation audit
        run: node tests/audit.mjs
      - name: Playables offline audit
        # The Playables bundle must not reference any network origin other
        # than the YouTube SDK. Fail the build if anything else slips in.
        run: |
          if grep -oE 'https?://[a-z0-9.-]+' dist/playables/app.min.js | grep -v 'www.youtube.com' | sort -u | grep .; then
            echo "::error::External origins found in the Playables bundle (must be offline)"; exit 1
          fi
          echo "Playables bundle is clean (no external origins)."
      - name: Smoke test (web, playables, local)
        run: |
          node tests/smoke.mjs dist/web
          node tests/smoke.mjs dist/playables
          node tests/smoke.mjs dist/local
      - name: Responsive matrix (Playables aspect ratios 9:32 … 32:9)
        run: node tests/responsive.mjs dist/web
      - name: Full-loop e2e (start -> game over -> retry)
        run: node tests/e2e-gameover.mjs dist/web
      - name: Package distribution zips
        run: |
          npm run zip:playables
          npm run zip:itch
      - name: Upload Playables bundle (for the Developer Portal)
        uses: actions/upload-artifact@v6
        with:
          name: lumenward-playables
          path: lumenward-playables.zip
      - name: Upload itch.io bundle
        uses: actions/upload-artifact@v6
        with:
          name: lumenward-itch
          path: lumenward-itch.zip
      - name: Upload web build (Vercel/Pages ready)
        uses: actions/upload-artifact@v6
        with:
          name: lumenward-web
          path: dist/web
