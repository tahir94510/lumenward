  <!-- star silhouette (soft rim) -->
  <polygon points="256.0,114.0 291.6,213.1 396.8,216.3 313.5,280.7 343.0,381.7 256.0,322.5 169.0,381.7 198.5,280.7 115.2,216.3 220.4,213.1" fill="#8a5a20" filter="url(#soft)" opacity="0.85"/>

