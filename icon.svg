<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="void" cx="50%" cy="44%" r="75%">
      <stop offset="0%" stop-color="#231a4d"/>
      <stop offset="42%" stop-color="#140f30"/>
      <stop offset="100%" stop-color="#05050d"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8" stop-opacity="0.95"/>
      <stop offset="34%" stop-color="#ffc86b" stop-opacity="0.42"/>
      <stop offset="70%" stop-color="#ff9d5c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff9d5c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="facetLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="55%" stop-color="#ffe29a"/>
      <stop offset="100%" stop-color="#ffc86b"/>
    </linearGradient>
    <linearGradient id="facetDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd98c"/>
      <stop offset="55%" stop-color="#f2a94f"/>
      <stop offset="100%" stop-color="#c97e2e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bffff4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#bffff4" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#8fb4ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8fb4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
